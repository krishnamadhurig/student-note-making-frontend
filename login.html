<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <div class="container">

    <form
      id="loginForm"
      class="form"
    >

      <h2>
        Welcome Back
      </h2>

      <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
      >

      <button type="submit">
        Login
      </button>

      <p>

        Don't have account?

        <a href="register.html">
          Register
        </a>

      </p>

    </form>

  </div>

  <script src="./js/login.js"></script>

</body>
</html>
