<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Pomodoro Timer</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>
  <a href="dashboard.html" class="back-btn">
  ← Back
</a>

  <div class="pomodoro-container">

    <h1>
      Pomodoro Study Timer
    </h1>

    <div class="timer-box">

      <h2 id="timer">
        25:00
      </h2>

      <p id="sessionText">
        Focus Session
      </p>

    </div>

    <div class="timer-buttons">

      <button id="startBtn">
        Start
      </button>

      <button id="pauseBtn">
        Pause
      </button>

      <button id="resetBtn">
        Reset
      </button>

    </div>

    <div class="productivity-box">

      <h3>
        Today's Productivity
      </h3>

      <p>

        Completed Sessions:

        <span id="sessionCount">
          0
        </span>

      </p>

    </div>

  </div>

  <script src="./js/pomodoro.js"></script>

</body>
</html>
